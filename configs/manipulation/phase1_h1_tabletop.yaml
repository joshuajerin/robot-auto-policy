phase: 1
experiment_prefix: h1_tabletop_transfer
robot_spec: assets/h1_robot_spec.json
task: RoboGenesis-H1-Tabletop-Manipulation-v0
runner: rsl_rl
device: cuda:0
train:
  num_envs: 256
  max_iterations: 10
  seed: 42
  video: false
  command_timeout_seconds: 0
eval:
  num_envs: 8
  episodes_per_seed: 1
  max_steps_per_episode: 240
  command_timeout_seconds: 300
  seeds: [101]
render:
  mode: telemetry
  num_envs: 1
  video_length: 120
  trace_max_steps: 120
  fps: 20
  command_timeout_seconds: 300
  checkpoint: latest
artifacts:
  modal_volume: robogenesis-runs
  experiment_root: /runs/experiments
autoscale:
  gpu: H100
  max_phase1_containers: 4
  notes: "Start H1 tabletop transfer with 10 iterations. Scale to 200 only after train/eval/render works end to end."

