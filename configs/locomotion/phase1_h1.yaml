phase: 1
experiment_prefix: baseline_h1
robot_spec: assets/h1_robot_spec.json
task: Isaac-Velocity-Flat-H1-v0
stretch_task: Isaac-Velocity-Rough-H1-v0
runner: rsl_rl
device: cuda:0
train:
  num_envs: 512
  max_iterations: 10
  seed: 42
  video: false
  command_timeout_seconds: 0
eval:
  num_envs: 8
  episodes_per_seed: 1
  max_steps_per_episode: 1000
  seeds: [101]
render:
  num_envs: 1
  video_length: 60
  checkpoint: latest
artifacts:
  modal_volume: robogenesis-runs
  experiment_root: /runs/experiments
autoscale:
  gpu: H100
  max_phase1_containers: 4
  notes: "Default phase-1 is a small 10-iteration system test. Scale num_envs/max_iterations/eval seeds only after train/eval/render passes end to end."
